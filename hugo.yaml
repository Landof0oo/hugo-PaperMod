baseURL: "https://landofooo.vercel.app/"
languageCode: "zh-cn"
title: "löö's land"

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: "All"
      url: "posts"
      weight: 10
    - name: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>'
      url: "search"
      weight: 20

Params:
  label:
    text: "löö's land"
  assets:
    favicon: "/favicon.ico"
  
  ShowSearchButton: true
  disableThemeToggle: false
  ShowRSSButtonText: false
  showFullContents: false
  summaryLength: 0

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
