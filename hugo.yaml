baseURL: "https://landofooo.vercel.app/"
languageCode: "zh-cn"
title: "löö's land"

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: "All"
      url: "posts"
      weight: 10
    - name: "🔍"
      url: "search"
      weight: 20

Params:
  label:
    text: "löö's land"
  assets:
    favicon: "/favicon.ico"
  
  ShowSearchButton: true
  disableThemeToggle: false
  ShowRSSButtonText: false
  showFullContents: false
  summaryLength: 0

  homeInfoParams:
    Title: "<span style='font-size: 28px;'>Hi, welcome to land of o_o</span>"
    Content: >
      <div style='font-size: 15px; line-height: 1.4; margin-top: -10px; margin-bottom: -15px;'>
      我是 l ö ö 酱，会在这里记录一些日常心得，给人间的青草地浇浇水！
      </div>

  socialIcons:
    - name: youtube
      url: "https://www.youtube.com/@landofo_o"
    - name: x
      url: "https://x.com/landofo_o"
    - name: email
      url: "mailto:dogblessuuu@gmail.com"
      
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
