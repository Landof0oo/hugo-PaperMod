baseURL: "https://landofooo.vercel.app/"
languageCode: "zh-cn"
title: "löö's land" # 这就是左侧显示的站名
theme: "PaperMod"

# 导航栏配置：在这里加你想放的页面
menu:
  main:
    - name: "文章"
      url: "posts"
      weight: 10
    - name: "关于"
      url: "about"
      weight: 20

params:
  # 开启右上角的搜索图标 (需要额外加一个小文件，想加的话跟我说)
  ShowSearchButton: true 
  # 右上角的 RSS 图标是默认开启的
  # 右上角的 月亮/太阳 切换
  disableThemeToggle: false
