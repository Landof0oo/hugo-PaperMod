baseURL: "https://landofooo.vercel.app/"
languageCode: "zh-cn"
title: "löö's land"

# 导航栏配置
menu:
  main:
    - name: "All"
      url: "posts"
      weight: 10

# 只有放在 params 缩进下的东西才会出现在右上角
params:
  # 1. 名字显示在左上角
  label:
    text: "löö's land"
  
  # 2. 放大镜图标
  ShowSearchButton: true
  
  # 3. 月亮/太阳切换（确保是 false 才会显示按钮）
  disableThemeToggle: false
  
  # 4. RSS 图标（只要你配置了，默认就会出现）
  ShowRSSButtonText: false

  # 像 cbvivi 那样主页只显示列表，不显示正文
  showFullContents: false
  summaryLength: 0
