baseURL: "https://landofooo.vercel.app/"
languageCode: "zh-cn"
title: "löö's land"

markup:
  goldmark:
    renderer:
      unsafe: true
      
outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: "All"
      url: "posts"
      weight: 10
    - name: "🔍"
      url: "search"
      weight: 20

Params:
  label:
    text: "löö's land"
  assets:
    favicon: "/favicon.ico"

  ShowSearchButton: true
  disableThemeToggle: false
  ShowRSSButtonText: false
  showFullContents: false
  summaryLength: 0

  homeInfoParams:
    Title: "Hi, welcome to land of o_o"
    Content: >
      我是löö 酱，会在这里记录一些日常心得，给人间的青草地浇浇水。

  socialIcons:
    - name: youtube
      url: "https://www.youtube.com/@landofo_o"
    - name: x
      url: "https://x.com/landofo_o"
    - name: email
      url: "mailto:dogblessuuu@gmail.com"
    - name: spotify
      title: "Listen on Spotify"
      url: "https://open.spotify.com/user/mckenziearnold12049?si=db3e3f6c48c74c3f"
      
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
