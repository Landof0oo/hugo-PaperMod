baseURL: "https://landofooo.vercel.app/"
languageCode: "zh-cn"
title: "löö's land"

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: "All"
      url: "posts"
      weight: 10
    - name: "🔍"
      url: "search"
      weight: 20

Params:
  label:
    text: "löö's land"
  assets:
    favicon: "/favicon.ico"
  
  ShowSearchButton: true
  disableThemeToggle: false
  ShowRSSButtonText: false
  showFullContents: false
  summaryLength: 0

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 100
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]
